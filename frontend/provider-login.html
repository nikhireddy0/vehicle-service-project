<!DOCTYPE html>
<html>
<head>
<title>Service Provider Login</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
width:320px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
font-size:14px;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Service Provider Login</h2>

<label>Email</label>
<input type="email" id="email" placeholder="Enter email">

<label>Password</label>
<input type="password" id="password" placeholder="Enter password">

<button onclick="loginProvider()">Login</button>

<div id="errorMsg" class="error"></div>

</div>

<script>

const API_BASE_URL = "https://automobile-breakdown-backend.onrender.com";

async function loginProvider(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const errorBox = document.getElementById("errorMsg");

errorBox.innerText = "";

try{

const response = await fetch(API_BASE_URL + "/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
});

const data = await response.json();

if(response.ok){

localStorage.setItem("providerToken", data.token);

alert("Login successful");

window.location.href="dashboard.html";

}else{

errorBox.innerText = data.message || "Login failed";

}

}catch(error){

errorBox.innerText = "Server connection error";

console.error(error);

}

}

</script>

</body>
</html>
